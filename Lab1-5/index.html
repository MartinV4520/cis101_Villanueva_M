<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Mad Tea-Party Order Form</title>
</head>
<body>

    <h1>A Mad Tea-Party</h1>
    <h2>Tea Party Supplies</h2>

    <table border="1">
        <tr>
            <td>Tea Cups with Saucers</td>
            <td>$35.99</td>
        </tr>
        <tr>
            <td>Teapots</td>
            <td>$42.50</td>
        </tr>
        <tr>
            <td>Tea Strainers</td>
            <td>$12.75</td>
        </tr>
        <tr>
            <td>Tea Towels</td>
            <td>$9.99</td>
        </tr>
        <tr>
            <td>Tea Trays</td>
            <td>$18.25</td>
        </tr>
        <tr>
            <td>Tea Candles</td>
            <td>$7.50</td>
        </tr>
    </table>

    <h3>Order Form</h3>

    <form method="post" action="https://httpbin.org/post">

        <label for="name">Customer Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="address">Mailing Address:</label>
        <input type="text" id="address" name="address"><br><br>

        <label for="city">City:</label>
        <input type="text" id="city" name="city"><br><br>

        <label for="state">State:</label>
        <select id="state" name="state">
            <option value="IL">IL</option>
            <option value="IN">IN</option>
            <option value="MI">MI</option>
            <option value="WI">WI</option>
        </select><br><br>

        <p>Choose a shipping option:</p>
        <input type="radio" id="standard" name="shipping" value="standard">
        <label for="standard">Standard shipping (3–4 days)</label><br>

        <input type="radio" id="rush" name="shipping" value="rush">
        <label for="rush">Rush shipping (2 days)</label><br>

        <input type="radio" id="overnight" name="shipping" value="overnight">
        <label for="overnight">Overnight shipping (1 day)</label><br><br>

        <label for="instructions">Special delivery instructions?</label><br>
        <textarea id="instructions" name="instructions" cols="30" rows="4"></textarea><br><br>

        <input type="checkbox" id="mailinglist" name="mailinglist" checked>
        <label for="mailinglist">E-mail me about future promotions and sales.</label><br><br>

        <input type="submit" value="Place Order">

    </form>

</body>
</html>
